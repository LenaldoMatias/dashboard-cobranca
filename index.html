<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestek Telecom | Inadimplência</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF6600',
                            navy: '#004892',
                            bg: '#F4F6F8',
                        },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        };
    </script>

    <style type="text/css">
        body { font-family: 'Inter', sans-serif; background-color: #F4F6F8; margin: 0; overflow-x: hidden; }
        
        .sidebar {
            width: 260px;
            background-color: #000;
            height: 100vh;
            position: fixed;
            transition: all 0.3s;
            z-index: 100;
        }

        .sidebar-logo {
            width: 180px;
            height: auto;
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            color: #FF6600;
            text-decoration: none;
            background: #111;
            border-left: 4px solid #FF6600;
            font-weight: 600;
        }

        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-container {
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 72, 146, 0.1);
            overflow: hidden;
            position: relative;
            padding-bottom: 110%; /* Ajuste a altura do dash aqui */
            height: 0;
            width: 100%;
        }

        .dashboard-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; /* Ajustado para mostrar a barra de páginas */
            border: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 70px; }
            .sidebar-logo { width: 42px; margin: auto; }
            .nav-item span:not(.material-symbols-outlined) { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>

<body class="text-slate-800">

    <nav class="sidebar flex flex-col py-6">
        <div class="px-6 mb-10">
            <img src="logo.png" alt="Prestek Telecom" class="sidebar-logo">
        </div>

        <div class="flex flex-col flex-grow">
            <a href="#" class="nav-item">
                <span class="material-symbols-outlined">payments</span>
                <span>Inadimplência</span>
            </a>
        </div>

        <div class="px-6 mt-auto text-center border-t border-zinc-800 pt-6">
            <div class="bg-zinc-900 rounded-lg p-3">
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest leading-tight">
                    Prestek Analytics<br>v 2.0.26
                </p>
            </div>
        </div>
    </nav>

    <div class="main-content">
        
        <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center sticky top-0 z-50">
            <div>
                <h1 class="text-2xl font-extrabold text-brand-navy tracking-tight uppercase leading-none">
                    Indicadores de Inadimplência
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        Acesso Público • Atualização Automática
                    </span>
                </div>
            </div>
            </header>

        <main class="p-4 lg:p-6 flex-grow flex flex-col">
            <div class="dashboard-container">
                <iframe 
                    title="Indicadores BI - PRESTEK" 
                    src="https://app.powerbi.com/view?r=eyJrIjoiZWJlNWUzNGQtNTFjMy00NjQ2LTgxZTEtOGI2MmQwMmI4NGRlIiwidCI6Ijc4MmFmZDE4LWU3ZjAtNDM5Zi1iNzdmLWZiM2Q3YjExOWExMCJ9&navContentPaneEnabled=true" 
                    allowFullScreen="true">
                </iframe>
            </div>
        </main>

        <footer class="p-4 bg-white border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
                Prestek Telecom • 2026
            </p>
        </footer>
    </div>

</body>
</html>
